# Log4j2 config Spark - output lebih bersih untuk demo.
# Root level WARN + matikan logger yang menghasilkan noise race single-node
# (NullPointerException BlockManager saat startup) yang sebenarnya tidak fatal.

rootLogger.level = warn
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

# --- Redam noise race startup single-node (NPE re-register BlockManager) ---
logger.inbox.name = org.apache.spark.rpc.netty.Inbox
logger.inbox.level = off

logger.bmme.name = org.apache.spark.storage.BlockManagerMasterEndpoint
logger.bmme.level = off

logger.executor.name = org.apache.spark.executor.Executor
logger.executor.level = error

# --- Warning kecil yang tidak penting ---
logger.nativecode.name = org.apache.hadoop.util.NativeCodeLoader
logger.nativecode.level = error

logger.metrics.name = org.apache.hadoop.metrics2
logger.metrics.level = error

# --- Warning non-fatal yang ramai saat tulis Gold / training / LLM window ---
# "Could not alter schema in a Hive compatible way" (Delta fallback, normal)
logger.hivecatalog.name = org.apache.spark.sql.hive.HiveExternalCatalog
logger.hivecatalog.level = error
# "Broadcasting large task binary" saat training model
logger.dag.name = org.apache.spark.scheduler.DAGScheduler
logger.dag.level = error
# "No Partition Defined for Window operation" saat ranking LLM
logger.window.name = org.apache.spark.sql.execution.WindowExec
logger.window.level = error
logger.sessionstate.name = org.apache.hadoop.hive.ql.session.SessionState
logger.sessionstate.level = error

# Catatan: output ">>> ..." dari script Python lewat stdout (print),
# tidak terpengaruh konfigurasi log4j ini, jadi tetap tampil.
