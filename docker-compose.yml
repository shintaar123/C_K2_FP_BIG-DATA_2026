services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # port API (dipakai Spark, Trino)
      - "9001:9001"   # port konsol web (buat kamu buka di browser)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
  hive-postgres:
    image: postgres:15
    container_name: hive-postgres
    environment:
      POSTGRES_USER: ${HIVE_PG_USER}
      POSTGRES_PASSWORD: ${HIVE_PG_PASSWORD}
      POSTGRES_DB: ${HIVE_PG_DB}
    volumes:
      - hive_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HIVE_PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    depends_on:
      hive-postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: "-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-postgres:5432/metastore -Djavax.jdo.option.ConnectionUserName=${HIVE_PG_USER} -Djavax.jdo.option.ConnectionPassword=${HIVE_PG_PASSWORD}"
    volumes:
      - ./hive/metastore-site.xml:/opt/hive/conf/metastore-site.xml
      - ./hive/lib/postgresql-42.7.4.jar:/opt/hive/lib/postgresql-42.7.4.jar
      - ./hive/lib/hadoop-aws-3.3.6.jar:/opt/hadoop/share/hadoop/common/lib/hadoop-aws-3.3.6.jar
      - ./hive/lib/aws-java-sdk-bundle-1.12.367.jar:/opt/hadoop/share/hadoop/common/lib/aws-java-sdk-bundle-1.12.367.jar
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"   # untuk koneksi dari laptopmu (script Python)
      - "9094:9094"   # untuk koneksi antar container
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    user: root
    env_file:
      - .env
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master port (untuk worker & job)
    environment:
      SPARK_MODE: master
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      bash -c "pip install -q feedparser==6.0.11 kafka-python-ng==2.2.3 requests==2.32.3 beautifulsoup4==4.12.3 python-dotenv==1.0.1 mlflow==2.17.2 boto3 urllib3==1.26.20 google-api-python-client 2>/dev/null;
      exec /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"
    volumes:
      - ./spark:/opt/spark/work-dir/app
      - ./data:/opt/spark/work-dir/data   # dataset berlabel untuk training & predict
      - ./llm:/opt/spark/work-dir/llm     # script LLM enrichment
      - ./ingestion:/opt/spark/work-dir/ingestion
      - ./kafka:/opt/spark/work-dir/kafka
      - ./.ivy:/tmp/.ivy
      - ./spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro


  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    user: root
    env_file:
      - .env
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      bash -c "pip install -q feedparser==6.0.11 kafka-python-ng==2.2.3 requests==2.32.3 beautifulsoup4==4.12.3 python-dotenv==1.0.1 mlflow==2.17.2 boto3 urllib3==1.26.20 google-api-python-client 2>/dev/null;
      exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    volumes:
      - ./spark:/opt/spark/work-dir/app
      - ./data:/opt/spark/work-dir/data
      - ./llm:/opt/spark/work-dir/llm
      - ./ingestion:/opt/spark/work-dir/ingestion
      - ./kafka:/opt/spark/work-dir/kafka
      - ./.ivy:/tmp/.ivy
      - ./spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
  trino:
    image: trinodb/trino:455
    container_name: trino
    depends_on:
      - hive-metastore
      - minio
    ports:
      - "8081:8080"   # Trino Web UI & koneksi SQL (port host 8081 supaya tak bentrok Spark 8080)
    volumes:
      - ./trino/catalog:/etc/trino/catalog
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: mlflow
    depends_on:
      hive-postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: >
      bash -c "pip install psycopg2-binary boto3 --quiet &&
      mlflow server
      --backend-store-uri postgresql://hive:hivepassword@hive-postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0 --port 5000"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    depends_on:
      - trino
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: trino-datasource
      # Tunggu plugin Trino selesai dipasang sebelum start
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: trino-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning otomatis: datasource Trino + dashboard "Surabaya EWS"
      # (lihat folder grafana/provisioning/ di repo)
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
  superset-init:
    image: apache/superset:4.1.1
    container_name: superset-init
    depends_on:
      hive-postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://hive:hivepassword@hive-postgres:5432/superset
      # Path ke file config Python (lihat ./superset/superset_config.py).
      # Tanpa ini, Superset fallback ke SQLite -> 500 errors di UI.
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      PYTHONPATH: /app/pythonpath:/app
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    entrypoint: /bin/bash
    command: >
      -c "pip install psycopg2-binary trino --quiet &&
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin &&
      superset init"

  superset:
    image: apache/superset:4.1.1
    container_name: superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://hive:hivepassword@hive-postgres:5432/superset
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      PYTHONPATH: /app/pythonpath:/app
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      bash -c "pip install psycopg2-binary trino --quiet &&
      gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 'superset.app:create_app()'"

  # Auto-provision koneksi Trino + dataset + chart + dashboard Superset
  # Script idempoten: aman di-rerun, skip resource yang sudah ada.
  superset-bootstrap:
    image: python:3.11-slim
    container_name: superset-bootstrap
    depends_on:
      - superset
      - trino
    volumes:
      - ./superset:/bootstrap:ro
    environment:
      SUPERSET_URL: http://superset:8088
      SUPERSET_USERNAME: admin
      SUPERSET_PASSWORD: admin
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_CATALOG: delta
      TRINO_USER: admin
    command: >
      bash -c "pip install --quiet requests &&
      python /bootstrap/bootstrap.py"
    restart: "no"
volumes:
  minio_data:
  hive_pg_data:
  kafka_data:
  grafana_data: