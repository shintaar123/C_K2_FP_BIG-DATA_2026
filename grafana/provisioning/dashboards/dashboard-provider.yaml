# Grafana dashboard provider — auto-load semua .json di folder ini
apiVersion: 1

providers:
  - name: 'Surabaya EWS'
    orgId: 1
    folder: 'Surabaya EWS'
    folderUid: surabaya-ews-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
